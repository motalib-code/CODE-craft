name: codecraft
description: AI-powered coding platform for Indian students
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3



  # Firebase (web+android both work)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  google_sign_in: ^6.2.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.4

  # Networking (web+android)
  http: ^1.2.2
  dio: ^5.7.0

  # Storage (web+android)
  shared_preferences: ^2.3.2


  # Files & Media (web+android)
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Utils
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5
  flutter_svg: ^2.0.10+1

  # PDF (web+android)
  pdf: ^3.11.1
  printing: ^5.13.2

  # QR
  qr_flutter: ^4.1.0

  # Markdown + Code
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
