<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CodeCraft - AI-powered coding platform for Indian students">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7C3AED">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeCraft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CodeCraft</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Sign-In Client ID (Required for Flutter Web) -->
  <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0818;
      overflow: hidden;
    }

    /* Loading spinner */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: 'Segoe UI', sans-serif;
    }

    .loading .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #7C3AED, #2563EB);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 32px;
      font-weight: 800;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.3);
      margin-bottom: 20px;
    }

    .loading p {
      color: #94A3B8;
      font-size: 14px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(124, 58, 237, 0.2);
      border-top: 2px solid #7C3AED;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="logo">&lt;/&gt;</div>
    <p>Loading CodeCraft...</p>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
